# === БАЗА ===
port: 7890
mixed-port: 7893
allow-lan: true
mode: Rule
log-level: info
ipv6: false

# === DNS ===
dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - https://dns.google/dns-query
    - https://1.1.1.1/dns-query

# === ПРОКСИ ===
# Marzban АВТОМАТИЧЕСКИ добавит прокси сюда
# НЕ используй {{ nodes.* }} в кастомном шаблоне!
proxies: []

# === ГРУППЫ ===
proxy-groups:
  - name: 🚀 Выбор
    type: select
    proxies:
      - DIRECT
      # Marzban добавит сюда прокси автоматически

  - name: ⚡ Авто
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - 🚀 Выбор

# === ПРАВИЛА ===
rules:
  # 🔴 РОССИЯ — НАПРЯМУЮ
  - GEOSITE,category-ru,DIRECT
  - GEOIP,ru,DIRECT
  - DOMAIN-SUFFIX,ru,DIRECT
  - GEOSITE,yandex,DIRECT
  - GEOSITE,vk,DIRECT

  # 🔵 DISCORD — ЧЕРЕЗ ПРОКСИ
  - GEOSITE,discord,🚀 Выбор
  - DOMAIN-SUFFIX,discord.com,🚀 Выбор

  # 🟣 AI — ЧЕРЕЗ ПРОКСИ
  - GEOSITE,openai,🚀 Выбор
  - DOMAIN-SUFFIX,openai.com,🚀 Выбор

  # 🟡 СОЦСЕТИ
  - GEOSITE,youtube,🚀 Выбор
  - GEOSITE,instagram,🚀 Выбор

  # ⚪ ВСЁ ОСТАЛЬНОЕ
  - MATCH,🚀 Выбор
